services:
  backend:
    build:
      context: ./backend
    container_name: ai-sulu-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app/data:/app/app/data
      - ./backend/app/logs:/app/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: ai-sulu-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped
